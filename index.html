<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Polygon to Circle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d14;
      --surface: #141721;
      --surface-hover: #1a1e2c;
      --border: #232738;
      --border-highlight: #3a3f55;
      --text: #e8eaf0;
      --muted: #7a7f96;
      --accent: #7b9aff;
      --accent-bright: #a0b8ff;
      --accent-dim: rgba(123, 154, 255, 0.12);
      --accent-glow: rgba(123, 154, 255, 0.06);
      --circle: rgba(123, 154, 255, 0.18);
      --polygon-stroke: #7b9aff;
      --polygon-fill: rgba(123, 154, 255, 0.06);
      --polygon-glow: rgba(123, 154, 255, 0.3);
      --radius: 10px;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(123, 154, 255, 0.04) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(123, 154, 255, 0.02) 0%, transparent 70%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent-bright) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stats {
      display: flex;
      gap: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
      justify-content: center;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .stats span {
      color: var(--accent-bright);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .canvas-wrap {
      position: relative;
      border-radius: 16px;
      padding: 2px;
      background: linear-gradient(145deg, var(--border-highlight), var(--border));
    }

    .canvas-wrap::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 17px;
      background: radial-gradient(ellipse at 50% 0%, rgba(123,154,255,0.08), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    canvas {
      display: block;
      position: relative;
      z-index: 1;
      width: min(78vw, 70vh, 460px);
      height: min(78vw, 70vh, 460px);
      border-radius: 14px;
      background: var(--surface);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 480px;
    }

    .sides-stepper {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .sides-stepper label {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0 0.6rem 0 0.75rem;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .sides-stepper input {
      width: 3.5rem;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      font-variant-numeric: tabular-nums;
      padding: 0.5rem 0;
      -moz-appearance: textfield;
    }

    .sides-stepper input::-webkit-inner-spin-button,
    .sides-stepper input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .step-btn {
      appearance: none;
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--muted);
      font-size: 1.3rem;
      line-height: 1;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .step-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .step-btn:active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    @media (pointer: coarse) {
      .step-btn {
        width: 3rem;
        height: 3rem;
        font-size: 1.5rem;
      }
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.6rem 1.1rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      background: var(--surface-hover);
      border-color: var(--border-highlight);
    }

    button:active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    button.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .speed-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .speed-group label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .speed-group select {
      appearance: none;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.8rem;
      padding: 0.6rem 0.85rem;
      border-radius: var(--radius);
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    .speed-group select:hover {
      border-color: var(--border-highlight);
    }
  </style>
</head>
<body>
  <header>
    <h1>Polygon &rarr; Circle</h1>
    <div class="stats">
      <div>Sides <span id="sideCount">3</span></div>
      <div>Area <span id="areaRatio">&mdash;</span></div>
    </div>
  </header>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div class="controls">
    <div class="sides-stepper">
      <label for="sidesInput">Sides</label>
      <input id="sidesInput" type="number" min="3" max="1000" value="3">
      <button type="button" class="step-btn" id="btnMinus" aria-label="Remove side">&minus;</button>
      <button type="button" class="step-btn" id="btnPlus" aria-label="Add side">+</button>
    </div>
    <button id="btnAnimate">Animate</button>
    <button id="btnReset">Reset</button>
    <div class="speed-group">
      <label for="speedSelect">Speed</label>
      <select id="speedSelect">
        <option value="1500">Slow</option>
        <option value="800" selected>Medium</option>
        <option value="300">Fast</option>
      </select>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const sidesInput = document.getElementById("sidesInput");
    const sideCountEl = document.getElementById("sideCount");
    const areaRatioEl = document.getElementById("areaRatio");
    const btnAnimate = document.getElementById("btnAnimate");
    const btnReset = document.getElementById("btnReset");
    const btnMinus = document.getElementById("btnMinus");
    const btnPlus = document.getElementById("btnPlus");
    const speedSelect = document.getElementById("speedSelect");

    let sides = 3;
    let animating = false;
    let animTimer = null;

    // Transition state
    let displaySides = 3;
    let targetSides = 3;
    let transitionProgress = 1;
    let lastFrameTime = 0;
    const TRANSITION_DURATION = 250;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    function getPolygonVertices(n, cx, cy, r) {
      const verts = [];
      for (let i = 0; i < n; i++) {
        const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
        verts.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
      }
      return verts;
    }

    function lerpVertices(fromN, toN, t, cx, cy, r) {
      const points = [];
      const count = Math.max(fromN, toN) * 4;
      for (let i = 0; i < count; i++) {
        const frac = i / count;
        const angle = -Math.PI / 2 + 2 * Math.PI * frac;
        const fromR = polygonRadiusAtAngle(fromN, r, frac);
        const toR = polygonRadiusAtAngle(toN, r, frac);
        const interpR = fromR + (toR - fromR) * t;
        points.push({
          x: cx + interpR * Math.cos(angle),
          y: cy + interpR * Math.sin(angle),
        });
      }
      return points;
    }

    function polygonRadiusAtAngle(n, R, frac) {
      const sectorAngle = (2 * Math.PI) / n;
      const angle = frac * 2 * Math.PI;
      const offset = angle % sectorAngle;
      const halfSector = sectorAngle / 2;
      const distFromCenter = (R * Math.cos(halfSector)) / Math.cos(offset - halfSector);
      return Math.min(distFromCenter, R);
    }

    function easeInOut(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function drawShape(points, cx, cy, r, showVertices, n) {
      // Glow layer
      ctx.save();
      ctx.shadowColor = "rgba(123, 154, 255, 0.35)";
      ctx.shadowBlur = 20;
      ctx.beginPath();
      if (Array.isArray(points[0]) || points[0].x !== undefined) {
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
      }
      ctx.closePath();
      ctx.strokeStyle = "rgba(123, 154, 255, 0.5)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();

      // Fill
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.closePath();

      // Gradient fill
      const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      gradient.addColorStop(0, "rgba(123, 154, 255, 0.1)");
      gradient.addColorStop(1, "rgba(123, 154, 255, 0.02)");
      ctx.fillStyle = gradient;
      ctx.fill();

      // Stroke
      ctx.strokeStyle = "rgba(123, 154, 255, 0.85)";
      ctx.lineWidth = 2;
      ctx.stroke();

      // Vertices
      if (showVertices && n <= 64) {
        for (const v of points) {
          ctx.beginPath();
          ctx.arc(v.x, v.y, 3.5, 0, 2 * Math.PI);
          ctx.fillStyle = "rgba(123, 154, 255, 0.9)";
          ctx.fill();
          ctx.beginPath();
          ctx.arc(v.x, v.y, 3.5, 0, 2 * Math.PI);
          ctx.strokeStyle = "rgba(255,255,255,0.3)";
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    function draw() {
      const w = canvas.getBoundingClientRect().width;
      const h = canvas.getBoundingClientRect().height;
      const cx = w / 2;
      const cy = h / 2;
      const r = Math.min(w, h) * 0.38;

      ctx.clearRect(0, 0, w, h);

      // Draw subtle grid dots
      ctx.fillStyle = "rgba(123, 154, 255, 0.04)";
      const spacing = 24;
      for (let x = spacing; x < w; x += spacing) {
        for (let y = spacing; y < h; y += spacing) {
          ctx.beginPath();
          ctx.arc(x, y, 0.5, 0, 2 * Math.PI);
          ctx.fill();
        }
      }

      // Draw reference circle with glow
      ctx.save();
      ctx.shadowColor = "rgba(123, 154, 255, 0.12)";
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.strokeStyle = "rgba(123, 154, 255, 0.2)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 6]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      let currentN, areaR;

      if (transitionProgress < 1) {
        const easedT = easeInOut(transitionProgress);
        const fromN = displaySides;
        const toN = targetSides;
        const points = lerpVertices(fromN, toN, easedT, cx, cy, r);

        drawShape(points, cx, cy, r, false, Math.max(fromN, toN));

        const fromArea = areaRatioValue(fromN);
        const toArea = areaRatioValue(toN);
        areaR = fromArea + (toArea - fromArea) * easedT;
        currentN = Math.round(fromN + (toN - fromN) * easedT);
      } else {
        const n = targetSides;
        currentN = n;
        const verts = getPolygonVertices(n, cx, cy, r);
        drawShape(verts, cx, cy, r, true, n);
        areaR = areaRatioValue(n);
      }

      sideCountEl.textContent = currentN;
      areaRatioEl.textContent = (areaR * 100).toFixed(4) + "%";
    }

    function areaRatioValue(n) {
      return (n * Math.sin((2 * Math.PI) / n)) / (2 * Math.PI);
    }

    function setSides(n) {
      n = Math.max(3, Math.min(1000, Math.round(n)));
      if (n === targetSides && transitionProgress >= 1) return;

      displaySides = targetSides;
      targetSides = n;
      sides = n;
      sidesInput.value = n;

      if (Math.abs(targetSides - displaySides) <= 20) {
        transitionProgress = 0;
        lastFrameTime = performance.now();
        requestAnimationFrame(animateTransition);
      } else {
        transitionProgress = 1;
        displaySides = n;
        draw();
      }
    }

    function animateTransition(now) {
      if (transitionProgress >= 1) return;
      const elapsed = now - lastFrameTime;
      transitionProgress = Math.min(1, transitionProgress + elapsed / TRANSITION_DURATION);
      lastFrameTime = now;
      draw();
      if (transitionProgress < 1) {
        requestAnimationFrame(animateTransition);
      } else {
        displaySides = targetSides;
        draw();
      }
    }

    function startAnimation() {
      if (animating) return;
      animating = true;
      btnAnimate.classList.add("active");
      btnAnimate.textContent = "Pause";

      function step() {
        if (!animating) return;
        const next = sides + 1;
        if (next > 1000) {
          stopAnimation();
          return;
        }
        setSides(next);
        animTimer = setTimeout(step, parseInt(speedSelect.value));
      }
      step();
    }

    function stopAnimation() {
      animating = false;
      clearTimeout(animTimer);
      btnAnimate.classList.remove("active");
      btnAnimate.textContent = "Animate";
    }

    function reset() {
      stopAnimation();
      displaySides = 3;
      targetSides = 3;
      sides = 3;
      transitionProgress = 1;
      sidesInput.value = 3;
      draw();
    }

    // Event listeners
    btnAnimate.addEventListener("click", () => {
      animating ? stopAnimation() : startAnimation();
    });

    btnReset.addEventListener("click", reset);

    btnMinus.addEventListener("click", () => {
      stopAnimation();
      setSides(sides - 1);
    });

    btnPlus.addEventListener("click", () => {
      stopAnimation();
      setSides(sides + 1);
    });

    // Long-press repeat for stepper buttons
    for (const [btn, delta] of [[btnMinus, -1], [btnPlus, 1]]) {
      let holdTimer, holdInterval;
      let held = false;
      const startHold = (e) => {
        e.preventDefault();
        held = false;
        holdTimer = setTimeout(() => {
          held = true;
          holdInterval = setInterval(() => {
            stopAnimation();
            setSides(sides + delta);
          }, 100);
        }, 400);
      };
      const endHold = (e) => {
        clearTimeout(holdTimer);
        clearInterval(holdInterval);
        // On touch devices, preventDefault on touchstart blocks the synthetic
        // click event, so handle taps directly here instead.
        if (e.type === "touchend" && !held) {
          stopAnimation();
          setSides(sides + delta);
        }
        held = false;
      };
      btn.addEventListener("touchstart", startHold, { passive: false });
      btn.addEventListener("touchend", endHold);
      btn.addEventListener("touchcancel", endHold);
      btn.addEventListener("mousedown", startHold);
      btn.addEventListener("mouseup", endHold);
      btn.addEventListener("mouseleave", endHold);
    }

    sidesInput.addEventListener("input", () => {
      const val = parseInt(sidesInput.value);
      if (!isNaN(val) && val >= 3) {
        stopAnimation();
        setSides(val);
      }
    });

    speedSelect.addEventListener("change", () => {
      if (animating) {
        stopAnimation();
        startAnimation();
      }
    });

    window.addEventListener("resize", resize);
    resize();
  </script>
</body>
</html>
